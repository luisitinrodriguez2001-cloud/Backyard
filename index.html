<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backyard Layout Designer</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="script.js" defer></script>
</head>
<body>

    <main class="container">
        <header class="ui-panel">
            <h1>Backyard Layout Designer</h1>
            <div class="instructions" id="instructions">
                <p><kbd>Click / Drag</kbd> Paint selected material (based on paint mode)</p>
                <p><kbd>Right Click / Erase</kbd> Remove from square</p>
                <p><kbd>Scroll / Pinch</kbd> Zoom canvas</p>
                <p><kbd>Drag (Zoom only)</kbd> Pan around while zoomed</p>
            </div>

            <div class="panel-group">
                <h2>Canvas Size (feet)</h2>
                <div class="canvas-size-controls">
                    <label>
                        Width
                        <input id="canvas-width" type="number" min="10" max="200" value="40">
                    </label>
                    <label>
                        Height
                        <input id="canvas-height" type="number" min="10" max="200" value="60">
                    </label>
                </div>
                <button id="apply-canvas-btn">Apply Canvas Size</button>
            </div>

            <div class="panel-group">
                <h2>Paint Behavior</h2>
                <div class="paint-behavior-controls" role="radiogroup" aria-label="Paint behavior">
                    <label><input type="radio" name="paint-behavior" value="drag" checked> Drag paint</label>
                    <label><input type="radio" name="paint-behavior" value="single"> Single tile</label>
                    <label><input type="radio" name="paint-behavior" value="off"> Zoom only (paint off)</label>
                </div>
            </div>

            <div id="material-palette" class="material-palette" aria-label="Backyard material palette">
                <h2>Materials & Features</h2>
                <div class="palette-grid">
                    <button class="palette-btn is-active" data-material="deck">Deck Tile</button>
                    <button class="palette-btn" data-material="concrete">Concrete</button>
                    <button class="palette-btn" data-material="grass">Grass</button>
                    <button class="palette-btn" data-material="landscaping">Landscaping Bed</button>
                    <button class="palette-btn" data-material="sand">Sand</button>
                    <button class="palette-btn" data-material="seat">Seats</button>
                    <button class="palette-btn" data-material="pavers">Pavers</button>
                    <button class="palette-btn" data-material="gravel">Gravel</button>
                    <button class="palette-btn" data-material="turf">Artificial Turf</button>
                    <button class="palette-btn" data-material="white-vinyl-fence">White Vinyl Fence (Top View)</button>
                    <button class="palette-btn" data-material="door">Door (1 ft)</button>
                </div>
                <div id="texture-size-controls" class="texture-size-controls is-hidden" aria-live="polite">
                    <h3 id="texture-size-title">Texture Size</h3>
                    <div class="texture-size-options">
                        <label><input type="radio" name="texture-size" value="small"> Small</label>
                        <label><input type="radio" name="texture-size" value="medium" checked> Medium</label>
                        <label><input type="radio" name="texture-size" value="large"> Large</label>
                    </div>
                </div>
            </div>

            <div class="button-group" id="desktop-controls">
                <button id="measurements-btn">Show Measurements</button>
                <button id="export-btn" class="success-btn">Export Image</button>
                <button id="clear-btn" class="danger-btn">Clear All</button>
            </div>
        </header>

        <section class="workspace">
            <div class="mobile-top-bar" aria-label="Mobile tile actions">
                <button id="mobile-place-btn" class="mobile-tool-btn is-active" data-mode="place">Paint</button>
                <button id="mobile-remove-btn" class="mobile-tool-btn" data-mode="remove">Erase</button>
            </div>

            <div class="grid-shell" id="grid-shell">
                <div id="top-ruler" class="ruler top-ruler" aria-hidden="true"></div>
                <div id="left-ruler" class="ruler left-ruler" aria-hidden="true"></div>
                <div id="lawn" class="lawn-grid" aria-label="Backyard grid"></div>
            </div>
            <div id="mobile-export-slot" class="mobile-export-slot" aria-live="polite"></div>
        </section>
    </main>

</body>
</html>
